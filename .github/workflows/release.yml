name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build

      - name: Release smoke checks
        run: npm run smoke:release

      - name: Benchmark
        run: npm run benchmark:ci

      - name: API diff check
        run: npm run api:check

      - name: Check release toggle
        id: release_toggle
        run: |
          if [ "${{ vars.ENABLE_NPM_PUBLISH }}" = "true" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Release publish disabled. Set repository variable ENABLE_NPM_PUBLISH=true to enable npm publishing."
          fi

      - name: Validate npm publish auth
        if: steps.release_toggle.outputs.enabled == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::error::NPM_TOKEN is missing. Add a publish token in repository secrets."
            exit 1
          fi
          npm whoami >/dev/null 2>&1 || {
            echo "::error::NPM_TOKEN is invalid for npm registry auth."
            echo "::error::Use an npm token with publish access for package ${PACKAGE_NAME}."
            exit 1
          }

      - name: Check publishable version
        id: publishable
        if: steps.release_toggle.outputs.enabled == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          if npm view "${PACKAGE_NAME}@${PACKAGE_VERSION}" version >/dev/null 2>&1; then
            echo "publishable=false" >> "$GITHUB_OUTPUT"
            echo "::notice::${PACKAGE_NAME}@${PACKAGE_VERSION} is already published. Skipping publish."
          else
            echo "publishable=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create release PR / publish
        if: steps.release_toggle.outputs.enabled == 'true' && steps.publishable.outputs.publishable == 'true'
        uses: changesets/action@v1
        with:
          version: npm run version-packages
          publish: npm run release
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
