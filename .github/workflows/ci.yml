name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test:run

      - name: Build
        run: npm run build

      - name: Release smoke checks
        run: npm run smoke:release

      - name: Benchmark
        run: npm run benchmark:ci

      - name: API diff check
        run: npm run api:check

      - name: Changeset guard
        if: ${{ github.event_name == 'pull_request' }}
        run: npm run semver:changeset
